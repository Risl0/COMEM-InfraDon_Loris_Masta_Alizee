services:
  db:
    image: postgis/postgis:16-3.4
    container_name: infradon-service_tech
    environment:
      POSTGRES_USER: infradon
      POSTGRES_PASSWORD: infradon
      POSTGRES_DB: service_technique
    ports:
      - "5432:5432"
    volumes:
      - service_technique:/var/lib/postgresql/data
      - ./data:/data
      - ./initdb:/docker-entrypoint-initdb.d

volumes:
  service_technique:


